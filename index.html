<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PWA Desktop Pet</title>
    <style>
        :root {
            --sprite-size: 128px; /* Matches your Python script size */
        }

        body {
            background: #222;
            color: white;
            font-family: system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* The Pet Container */
        #pet-window {
            width: var(--sprite-size);
            height: var(--sprite-size);
            position: relative;
            cursor: grab;
            background-color: transparent;
        }

        /* THE SPRITE ANIMATION ENGINE */
        #pet-sprite {
            width: 100%;
            height: 100%;
            background-image: url('spritesheet.png');
            background-repeat: no-repeat;
            background-color: transparent;
            image-rendering: pixelated; /* Keeps pixel art sharp */
            
            /* Default State */
            background-position: 0px 0px; 
        }

        /* Animation Keyframes using steps() to jump between frames */
        @keyframes play-4-frames {
            from { background-position-x: 0px; }
            to { background-position-x: calc(var(--sprite-size) * -4); }
        }

        @keyframes play-8-frames {
            from { background-position-x: 0px; }
            to { background-position-x: calc(var(--sprite-size) * -8); }
        }

        /* CSS Classes for States */
        /* background-position-y moves to the specific row (RowIndex * 128) */
        .anim-idle      { background-position-y: calc(var(--sprite-size) * 0) !important; animation: play-4-frames 0.8s steps(4) infinite; }
        .anim-look_side { background-position-y: calc(var(--sprite-size) * -1) !important; animation: play-4-frames 0.8s steps(4) infinite; }
        .anim-lick      { background-position-y: calc(var(--sprite-size) * -2) !important; animation: play-4-frames 0.6s steps(4) infinite; }
        .anim-clean     { background-position-y: calc(var(--sprite-size) * -3) !important; animation: play-4-frames 0.6s steps(4) infinite; }
        .anim-walk      { background-position-y: calc(var(--sprite-size) * -4) !important; animation: play-8-frames 0.8s steps(8) infinite; }
        .anim-sleep     { background-position-y: calc(var(--sprite-size) * -6) !important; animation: play-4-frames 1.2s steps(4) infinite; }
        .anim-emote     { background-position-y: calc(var(--sprite-size) * -9) !important; animation: play-8-frames 1.0s steps(8) infinite; }

        /* Direction control */
        .facing-left { transform: scaleX(-1); }

        .controls {
            margin-top: 20px;
            background: #333;
            padding: 15px 25px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        button {
            padding: 10px 20px;
            font-weight: bold;
            cursor: pointer;
            background: #4CAF50;
            border: none;
            color: white;
            border-radius: 6px;
        }
    </style>
</head>
<body>

    <div id="pet-window">
        <div id="pet-sprite" class="anim-idle"></div>
    </div>

    <div class="controls">
        <button id="pip-btn">Float Pet (Always on Top)</button>
        <p style="font-size: 12px; color: #888;">Scroll on pet to interact</p>
    </div>

<script>
    const sprite = document.getElementById('pet-sprite');
    
    // Simple AI state controller
    const states = ['idle', 'look_side', 'lick', 'clean', 'walk', 'sleep'];
    let currentState = 'idle';

    function setAnimation(stateName) {
        // Remove all current animation classes
        sprite.className = '';
        // Add the new state class
        sprite.classList.add(`anim-${stateName}`);
        
        // Face a random direction if walking
        if (stateName === 'walk') {
            sprite.classList.toggle('facing-left', Math.random() > 0.5);
        }
    }

    // AI Logic Loop (changes behavior every few seconds)
    function aiBrain() {
        const randomState = states[Math.floor(Math.random() * states.length)];
        setAnimation(randomState);
        
        // Wait 2-5 seconds before next change
        setTimeout(aiBrain, 2000 + Math.random() * 3000);
    }

    // Initial Start
    aiBrain();

    // Interaction: Petting (Wheel event)
    document.getElementById('pet-window').addEventListener('wheel', (e) => {
        setAnimation('emote');
        // Resume normal AI after 2 seconds
        setTimeout(() => setAnimation('idle'), 2000);
    });

    /** PICTURE IN PICTURE LOGIC **/
    const pipBtn = document.getElementById('pip-btn');
    pipBtn.addEventListener('click', async () => {
        if (!window.documentPictureInPicture) {
            alert("Please use Chrome or Edge for Always-on-Top mode.");
            return;
        }

        const pipWindow = await window.documentPictureInPicture.requestWindow({
            width: 128,
            height: 128,
        });

        // Copy CSS to the new window
        [...document.styleSheets].forEach((styleSheet) => {
            try {
                const cssRules = [...styleSheet.cssRules].map((rule) => rule.cssText).join('');
                const style = document.createElement('style');
                style.textContent = cssRules;
                pipWindow.document.head.appendChild(style);
            } catch (e) {}
        });

        // Move the pet to the floating window
        const petWindow = document.getElementById('pet-window');
        pipWindow.document.body.style.backgroundColor = "transparent";
        pipWindow.document.body.style.overflow = "hidden";
        pipWindow.document.body.appendChild(petWindow);

        // Return pet to main window when closed
        pipWindow.addEventListener("pagehide", () => {
            document.body.prepend(petWindow);
        });
    });
</script>
</body>
</html>
